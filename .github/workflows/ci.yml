name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify Math Atoms Coder
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust format
        working-directory: atom-rendering-engine-main
        run: cargo fmt --check

      - name: Rust crate line caps
        shell: pwsh
        run: .\scripts\Test-RustCrateLineCaps.ps1

      - name: Rust tests
        working-directory: atom-rendering-engine-main
        run: cargo test --workspace
        env:
          RUSTFLAGS: "-D warnings"

      - name: Rust clippy
        working-directory: atom-rendering-engine-main
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Native app build
        working-directory: atom-rendering-engine-main
        run: cargo build -p math-atoms-native --release
        env:
          RUSTFLAGS: "-D warnings"

      - name: Native artifact render
        working-directory: atom-rendering-engine-main
        run: cargo run -p pmre-examples --example math_atoms_coder --release
        env:
          RUSTFLAGS: "-D warnings"

      - name: Validate native artifact
        shell: pwsh
        run: |
          $Artifact = "atom-rendering-engine-main\math_atoms_coder.bmp"
          if (-not (Test-Path -LiteralPath $Artifact)) {
            throw "Missing native artifact: $Artifact"
          }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $Artifact).Path)
          if ($bytes.Length -lt 54) {
            throw "Native artifact is too small to be a valid BMP: $Artifact"
          }
          if ($bytes[0] -ne 0x42 -or $bytes[1] -ne 0x4D) {
            throw "Native artifact does not have a BMP header: $Artifact"
          }
          $width = [BitConverter]::ToInt32($bytes, 18)
          $height = [BitConverter]::ToInt32($bytes, 22)
          if ($width -ne 1440 -or $height -ne 960) {
            throw "Unexpected native artifact dimensions: ${width}x${height}"
          }

      - name: Provider execution gate
        shell: pwsh
        run: .\scripts\Test-ProviderExecution.ps1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          MATH_ATOMS_PROVIDER_KIND: ${{ vars.MATH_ATOMS_PROVIDER_KIND || 'openai' }}
          MATH_ATOMS_PROVIDER_MODEL: ${{ vars.MATH_ATOMS_PROVIDER_MODEL }}
          MATH_ATOMS_PROVIDER_URL: ${{ vars.MATH_ATOMS_PROVIDER_URL }}
          MATH_ATOMS_PROVIDER_KEY_ENV: ${{ vars.MATH_ATOMS_PROVIDER_KEY_ENV }}
